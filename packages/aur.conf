# AUR packages installed via yay.
# Installed by: cmd/arch/6-desktop.sh (fresh install) or ./setup desktop (existing Arch).

## Login manager greeter
sysc-greet-hyprland       # Graphical console greeter for greetd (Go + Bubble Tea), Hyprland variant

## Shell - Quickshell
quickshell-git            # Quickshell - QML-based Wayland shell framework (latest git)

## File manager extras
nautilus-open-any-terminal # Nautilus extension: open chosen terminal from right-click
unarchiver                # Archive extraction CLI (unar) - supports many formats

## Version manager
asdf-vm                   # Multi-language runtime version manager

## Browsers
brave-bin                 # Brave browser (privacy-focused Chromium-based)
zen-browser-bin           # Zen Browser (Firefox-based, privacy-focused)
google-chrome             # Google Chrome browser

## Code editor
visual-studio-code-bin    # Visual Studio Code (official Microsoft binary release)

## Gaming
protonup-qt               # GUI tool for managing Proton-GE and Wine-GE for Steam

## Communication
discord                   # Discord messaging and voice client
equicord-installer-bin    # Equicord installer CLI (Equilotl) - Discord mod with OpenAsar

## Theming
matugen-bin               # Material You color scheme generation from wallpaper
