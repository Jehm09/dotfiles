# AUR packages installed via paru (or yay) during post-install.
# Installed by: setup post  →  cmd/arch/post-install.sh
# pacman packages go in apps.conf.

## Login manager greeter
sysc-greet-hyprland       # Graphical console greeter for greetd (Hyprland variant)

## Wayland shell
quickshell-git            # QML-based Wayland shell framework (latest git build)

## File manager extras
nautilus-open-any-terminal # Nautilus right-click: open any terminal
unarchiver                # Archive extraction CLI (unar) — supports many formats

## Version manager
asdf-vm                   # Multi-language runtime version manager

## Browsers
brave-bin                 # Brave browser (privacy-focused, Chromium-based)
zen-browser-bin           # Zen Browser (Firefox-based, privacy-focused)
google-chrome             # Google Chrome browser

## Code editor
visual-studio-code-bin    # VS Code (official Microsoft binary release)

## Gaming
steam                     # Steam gaming platform (requires multilib)
protonup-qt               # GUI tool for managing Proton-GE and Wine-GE

## Communication
equicord-installer-bin    # Equicord installer CLI (Equilotl) — Discord mod + OpenAsar

## Theming
matugen-bin               # Material You color scheme generator from wallpaper
