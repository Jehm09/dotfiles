# Personal applications installed via pacman (official repos).
# This file is injected into archinstall's user_configuration.json at install
# time by cmd/arch/install.sh — it is the single source of truth for packages.
# AUR-only packages go in aur.conf.

## Shell
fish                # User-friendly interactive shell

## File management
nautilus            # GNOME Files graphical file manager
less                # Terminal pager (man pages, pipe output)
ffmpeg              # Video thumbnail generation for file managers
poppler             # PDF rendering library (yazi PDF preview)
unzip               # ZIP archive extraction

## Image and media
viewnior            # Simple, fast image viewer
mpv                 # Video player supporting most formats

## System monitoring
btop                # Resource monitor with rich TUI

## CLI utilities
tree                # Directory tree viewer
wget                # File downloader
jq                  # JSON processor and query tool
ripgrep             # Fast grep replacement (rg)
fzf                 # General-purpose fuzzy finder
zoxide              # Smarter cd with frecency ranking
resvg               # SVG renderer (used by yazi for SVG preview)
imagemagick         # Image conversion and manipulation
rsync               # Fast incremental file sync

## Build tools (required to build AUR packages with paru/yay)
git                 # Version control system
base-devel          # GCC, make, and other tools needed by makepkg

## Communication
discord             # Discord messaging and voice client (official repo)

## Audio
cava                # Console-based audio visualizer (bar spectrum)

## Terminal file manager
yazi                # Blazing-fast terminal file manager with preview support

## Shell history and system info
atuin               # Shell history with sync, search, and statistics
fastfetch           # Fast system information display (neofetch alternative)
