# Personal applications installed via pacman.
# Installed by: cmd/arch/6-desktop.sh (fresh install) or ./setup desktop (existing Arch).
# AUR packages go in aur.conf.

## Terminal and shell
kitty               # GPU-accelerated terminal emulator (default terminal)
fish                # User-friendly interactive shell (set as default shell by the installer)
less                # Terminal pager (man pages, pipe output)

## File management
nautilus            # GNOME Files graphical file manager
ffmpegthumbnailer   # Video thumbnail generator for file managers
poppler             # PDF rendering library (used by yazi for PDF preview)
unzip               # ZIP archive extraction

## Image and media
viewnior            # Simple, fast image viewer
mpv                 # Video player supporting most formats

## System monitoring
htop                # Interactive process viewer
btop                # Resource monitor with rich TUI

## CLI utilities
tree                # Directory tree viewer
curl                # HTTP client and file transfer tool
wget                # File downloader
jq                  # JSON processor and query tool
ripgrep             # Fast grep replacement (rg command)
fzf                 # General-purpose fuzzy finder
bc                  # Arbitrary precision calculator
rsync               # Fast incremental file sync
xdg-user-dirs       # Manage standard user directories (Downloads, Pictures, etc.)

## Build tools (required for AUR)
git                 # Version control system
base-devel          # GCC, make, and other build tools needed by makepkg

## Audio
pavucontrol-qt      # PipeWire/PulseAudio volume control GUI (Qt version)
cava                # Console-based audio visualizer (bar spectrum)

## Terminal file manager
yazi                # Blazing-fast terminal file manager with preview support

## Shell history and system info
atuin               # Shell history with sync, search, and statistics
fastfetch           # Fast system information display (neofetch alternative)
