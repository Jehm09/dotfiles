# Hyprlock configuration
# Lockscreen with blurred background, centered clock and password field.

general {
    disable_loading_bar     = false
    hide_cursor             = true
    grace                   = 0
    no_fade_in              = false
}

background {
    monitor     =
    path        = screenshot           # blur the current screen
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
    vibrancy    = 0.1
}

# Large clock - top center
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(cdd6f4ff)
    font_size   = 90
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 200
    halign      = center
    valign      = center
}

# Date - below clock
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = rgba(a6adc8ff)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 100
    halign      = center
    valign      = center
}

# Password input field
input-field {
    monitor         =
    size            = 300, 50
    outline_thickness = 2
    dots_size       = 0.3
    dots_spacing    = 0.2
    dots_center     = true
    outer_color     = rgba(cba6f7ff)
    inner_color     = rgba(1e1e2ecc)
    font_color      = rgba(cdd6f4ff)
    fade_on_empty   = true
    placeholder_text = <i>Password...</i>
    hide_input      = false
    check_color     = rgba(a6e3a1ff)
    fail_color      = rgba(f38ba8ff)
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position        = 0, -100
    halign          = center
    valign          = center
}
