# ── Hyprlock configuration ────────────────────────────────────────────────────
# Colors use Catppuccin Mocha as fallback; matugen can override via a
# generated hyprlock-colors.conf if you extend the pipeline later.

$background = rgb(1e1e2e)
$surface     = rgb(313244)
$primary     = rgb(cba6f7)
$on_surface  = rgb(cdd6f4)
$subtle      = rgb(6c7086)

# ── Background ────────────────────────────────────────────────────────────────
background {
    monitor =
    path    = screenshot          # blur a screenshot of the screen
    blur_passes  = 3
    blur_size    = 8
    brightness   = 0.8
    contrast     = 0.9
    vibrancy     = 0.2
    vibrancy_darkness = 0.5
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:1000] date +"%H:%M"
    color    = rgba(cdd6f4ff)
    font_size   = 80
    font_family = JetBrainsMono Nerd Font
    font_weight = 300

    position  = 0, 180
    halign    = center
    valign    = center
}

label {
    monitor  =
    text     = cmd[update:60000] date +"%A, %d %B %Y"
    color    = rgba(a6adc8ff)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font

    position  = 0, 100
    halign    = center
    valign    = center
}

# ── Input field ───────────────────────────────────────────────────────────────
input-field {
    monitor  =
    size     = 300, 50

    outline_thickness = 2
    outer_color       = rgba(cba6f7cc)   # primary
    inner_color       = rgba(313244cc)   # surface
    font_color        = rgba(cdd6f4ff)   # on_surface
    check_color       = rgba(a6e3a1ff)   # green
    fail_color        = rgba(f38ba8ff)   # red
    capslock_color    = rgba(f9e2afff)   # yellow

    font_family = JetBrainsMono Nerd Font
    font_size   = 16

    placeholder_text  = <span foreground="##6c7086">Password</span>
    fail_text         = <span foreground="##f38ba8">$ATTEMPTS attempts</span>

    rounding         = 12
    fade_on_empty    = true
    hide_input       = false
    dots_size        = 0.33
    dots_spacing     = 0.15

    position  = 0, -60
    halign    = center
    valign    = center
}

# ── User label ────────────────────────────────────────────────────────────────
label {
    monitor  =
    text     = $USER
    color    = rgba(a6adc8ff)
    font_size   = 14
    font_family = JetBrainsMono Nerd Font

    position  = 0, -120
    halign    = center
    valign    = center
}
