# ── Idle daemon configuration ─────────────────────────────────────────────────
# Requires: hypridle (pacman)

general {
    lock_cmd      = pidof hyprlock || hyprlock   # only one hyprlock instance
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# ── Timeouts ──────────────────────────────────────────────────────────────────

# 5 min: dim display to 20%
listener {
    timeout  = 300
    on-timeout  = brightnessctl -s set 20%   # save + set 20%
    on-resume   = brightnessctl -r            # restore saved value
}

# 10 min: lock screen
listener {
    timeout  = 600
    on-timeout  = loginctl lock-session
}

# 12 min: turn screen off
listener {
    timeout  = 720
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# 30 min: suspend
listener {
    timeout  = 1800
    on-timeout  = systemctl suspend
}
