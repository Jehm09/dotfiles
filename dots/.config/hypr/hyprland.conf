# Hyprland main configuration
# Sources all sub-configs for cleaner organization.

source = ~/.config/hypr/hyprland/env.conf
source = ~/.config/hypr/hyprland/monitors.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/decoration.conf
source = ~/.config/hypr/hyprland/animations.conf
source = ~/.config/hypr/hyprland/keybinds.conf
source = ~/.config/hypr/hyprland/rules.conf
source = ~/.config/hypr/hyprland/autostart.conf

general {
    gaps_in             = 4
    gaps_out            = 8
    border_size         = 2
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)
    resize_on_border    = true
    layout              = dwindle
}

dwindle {
    pseudotile      = true
    preserve_split  = true
}

misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}
