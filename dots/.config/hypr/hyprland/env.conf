# ── Environment variables ────────────────────────────────────────────────────

# Wayland toolkit backends
env = GDK_BACKEND,         wayland,x11
env = QT_QPA_PLATFORM,     wayland;xcb
env = SDL_VIDEODRIVER,     wayland,x11,windows
env = CLUTTER_BACKEND,     wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Qt: disable client-side decorations, enable per-monitor scaling
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# XDG session
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE,    wayland
env = XDG_SESSION_DESKTOP, Hyprland

# Cursor — change theme and size here
env = XCURSOR_THEME, Bibata-Modern-Classic
env = XCURSOR_SIZE,  24

# Java AWT (prevents blank windows in some Java apps)
env = _JAVA_AWT_WM_NONREPARENTING, 1

# XWayland DPI scaling
env = GDK_SCALE, 1
