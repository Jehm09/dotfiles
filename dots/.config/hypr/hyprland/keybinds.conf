# ── Keybinds ─────────────────────────────────────────────────────────────────
# Modifier: $mod = Super (Windows key)

$mod = SUPER

# ── Apps ─────────────────────────────────────────────────────────────────────
bind = $mod,       T,     exec, kitty
bind = $mod,       W,     exec, brave
bind = $mod,       E,     exec, nautilus
bind = $mod,       C,     exec, code
bind = $mod,       V,     exec, kitty --class cliphist -e bash -c 'cliphist list | fzf | cliphist decode | wl-copy'

# ── Shell ─────────────────────────────────────────────────────────────────────
bind = $mod,       Space, exec, qs ipc call launcher toggle
bind = $mod,       Comma, exec, qs ipc call settings toggle

# ── Window actions ────────────────────────────────────────────────────────────
bind = $mod,       Q,     killactive
bind = $mod,       F,     fullscreen, 0
bind = $mod+ALT,   F,     fullscreen, 1
bind = $mod+ALT,   Space, togglefloating
bind = $mod+CTRL,  Backslash, centerwindow, 1
bind = $mod,       P,     pin

# ── Focus movement ────────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Window movement ───────────────────────────────────────────────────────────
bind  = $mod+SHIFT, left,  movewindow, l
bind  = $mod+SHIFT, right, movewindow, r
bind  = $mod+SHIFT, up,    movewindow, u
bind  = $mod+SHIFT, down,  movewindow, d
bind  = $mod+SHIFT, H,     movewindow, l
bind  = $mod+SHIFT, L,     movewindow, r
bind  = $mod+SHIFT, K,     movewindow, u
bind  = $mod+SHIFT, J,     movewindow, d

# ── Resize ────────────────────────────────────────────────────────────────────
binde = $mod+ALT, left,  resizeactive, -40 0
binde = $mod+ALT, right, resizeactive,  40 0
binde = $mod+ALT, up,    resizeactive,  0 -40
binde = $mod+ALT, down,  resizeactive,  0  40

# ── Mouse window control ──────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Workspaces (1–10) ─────────────────────────────────────────────────────────
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9
bind = $mod,       0, workspace, 10

# ── Move window to workspace ──────────────────────────────────────────────────
bind = $mod+SHIFT, 1, movetoworkspace, 1
bind = $mod+SHIFT, 2, movetoworkspace, 2
bind = $mod+SHIFT, 3, movetoworkspace, 3
bind = $mod+SHIFT, 4, movetoworkspace, 4
bind = $mod+SHIFT, 5, movetoworkspace, 5
bind = $mod+SHIFT, 6, movetoworkspace, 6
bind = $mod+SHIFT, 7, movetoworkspace, 7
bind = $mod+SHIFT, 8, movetoworkspace, 8
bind = $mod+SHIFT, 9, movetoworkspace, 9
bind = $mod+SHIFT, 0, movetoworkspace, 10

# ── Navigate workspaces ───────────────────────────────────────────────────────
binde = $mod+CTRL,       right, workspace, +1
binde = $mod+CTRL,       left,  workspace, -1
bind  = $mod,            mouse_down, workspace, -1
bind  = $mod,            mouse_up,   workspace, +1
binde = $mod+ALT,        right, movetoworkspace, +1
binde = $mod+ALT,        left,  movetoworkspace, -1

# ── Special workspace ─────────────────────────────────────────────────────────
bind = $mod,             S, togglespecialworkspace, special
bind = $mod+SHIFT,       S, movetoworkspace, special:special
bind = $mod+CTRL+SHIFT,  up,    movetoworkspace, special:special
bind = $mod+CTRL+SHIFT,  down,  movetoworkspace, e+0

# ── Session ───────────────────────────────────────────────────────────────────
bind = $mod,             L,     exec, hyprlock
bind = $mod+SHIFT,       L,     exec, systemctl suspend
bind = $mod+CTRL+SHIFT,  R,     exec, qs reload; hyprctl reload
bind = $mod+CTRL+SHIFT,  Q,     exec, hyprctl dispatch exit

# ── Screenshots ───────────────────────────────────────────────────────────────
# Full screen → clipboard
bind = ,             Print,  exec, grim - | wl-copy
# Region → clipboard
bind = $mod+SHIFT,   S,      exec, grim -g "$(slurp)" - | wl-copy
# Region → annotate with swappy
bind = $mod+SHIFT+ALT, S,    exec, grim -g "$(slurp)" - | swappy -f -
# Color picker → clipboard
bind = $mod+SHIFT,   C,      exec, hyprpicker -a

# ── Volume ────────────────────────────────────────────────────────────────────
# Note: value comes from wpctl (0.0–1.0); passed to the OSD as-is.
bindle = , XF86AudioRaiseVolume, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && \
    wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ && \
    qs ipc call osd show volume "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2}')"

bindle = , XF86AudioLowerVolume, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && \
    wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && \
    qs ipc call osd show volume "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2}')"

bindl  = , XF86AudioMute, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && \
    qs ipc call osd show muted 0

bindl  = , XF86AudioMicMute, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Also bind Super+Shift+M for audio mute (no media keys on some keyboards)
bindl  = $mod+SHIFT, M, exec, \
    wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && \
    qs ipc call osd show muted 0

# ── Brightness ────────────────────────────────────────────────────────────────
bindle = , XF86MonBrightnessUp, exec, \
    brightnessctl set 5%+ && \
    qs ipc call osd show brightness \
        "$(echo "scale=2; $(brightnessctl get) / $(brightnessctl max)" | bc)"

bindle = , XF86MonBrightnessDown, exec, \
    brightnessctl set 5%- && \
    qs ipc call osd show brightness \
        "$(echo "scale=2; $(brightnessctl get) / $(brightnessctl max)" | bc)"

# ── Media (playerctl) ─────────────────────────────────────────────────────────
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl pause
bindl = , XF86AudioStop,  exec, playerctl stop
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bind  = $mod+CTRL, Space,  exec, playerctl play-pause
bind  = $mod+CTRL, Right,  exec, playerctl next
bind  = $mod+CTRL, Left,   exec, playerctl previous
