# ── Startup programs ─────────────────────────────────────────────────────────
# exec-once: run once on session start
# exec:      run on every hyprland reload too

# ── Authentication and secrets ───────────────────────────────────────────────
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── D-Bus environment (needed by portals and some apps) ──────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── XDG portals ──────────────────────────────────────────────────────────────
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal-gtk

# ── Idle daemon ──────────────────────────────────────────────────────────────
exec-once = hypridle

# ── Wallpaper daemon (swww) ───────────────────────────────────────────────────
# swww-daemon must be running before quickshell tries to set a wallpaper.
exec-once = swww-daemon

# ── Shell (Quickshell) ───────────────────────────────────────────────────────
exec-once = qs

# ── Clipboard history ────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Cursor ───────────────────────────────────────────────────────────────────
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Classic
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# ── GTK / icon theme ─────────────────────────────────────────────────────────
exec-once = gsettings set org.gnome.desktop.interface gtk-theme      adw-gtk3-dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme     Papirus-Dark
exec-once = gsettings set org.gnome.desktop.interface color-scheme   prefer-dark
