# Input devices: keyboard, mouse, touchpad

input {
    kb_layout           = us
    kb_variant          =
    kb_model            =
    kb_options          =
    kb_rules            =

    numlock_by_default  = true
    follow_mouse        = 1
    sensitivity         = 0       # -1.0 to 1.0; 0 means no modification
    accel_profile       = flat    # flat acceleration feels more natural for desktop

    touchpad {
        natural_scroll      = true
        disable_while_typing = true
        tap-to-click        = true
        scroll_factor       = 0.8
    }
}

gestures {
    workspace_swipe         = false   # disabled: workspace switching via keybinds only
    workspace_swipe_fingers = 3
}
