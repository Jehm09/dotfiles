# Window rules
# Format: windowrulev2 = rule, matcher

# ------------------------------------------------------------------
# Floating windows
# ------------------------------------------------------------------
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(pavucontrol-qt)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(viewnior)$
windowrulev2 = float, class:^(swappy)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, title:^(Picture in Picture)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Open File)$

# Center small floating dialogs
windowrulev2 = center, class:^(pavucontrol-qt)$
windowrulev2 = center, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 800 500, class:^(pavucontrol-qt)$

# ------------------------------------------------------------------
# Opacity rules
# ------------------------------------------------------------------
windowrulev2 = opacity 0.95 0.90, class:^(kitty)$
windowrulev2 = opacity 0.95 0.90, class:^(yazi)$

# ------------------------------------------------------------------
# Workspace assignments
# ------------------------------------------------------------------
windowrulev2 = workspace 2, class:^(brave-browser)$
windowrulev2 = workspace 2, class:^(zen)$
windowrulev2 = workspace 2, class:^(google-chrome)$
windowrulev2 = workspace 3, class:^(Code)$
windowrulev2 = workspace 4, class:^(discord)$
windowrulev2 = workspace 5, class:^(steam)$

# ------------------------------------------------------------------
# Layer rules (for Quickshell surfaces)
# ------------------------------------------------------------------
layerrule = blur, quickshell
layerrule = ignorealpha 0.3, quickshell
