# ── Window rules ─────────────────────────────────────────────────────────────

# Slight transparency on non-fullscreen windows (shell surfaces excluded below)
windowrule = opacity 0.96 override, match:fullscreen false

# Apps that should stay fully opaque
windowrule = opaque true, match:class org\.quickshell
windowrule = opaque true, match:class imv|viewnior|swappy|mpv

# Center all non-XWayland floating windows (XWayland popups should stay put)
windowrule = center true, match:float true, match:xwayland false

# ── Float ─────────────────────────────────────────────────────────────────────
windowrule = float true, match:class blueman-manager
windowrule = float true, match:class org\.gnome\.FileRoller
windowrule = float true, match:class file-roller
windowrule = float true, match:class feh
windowrule = float true, match:class imv
windowrule = float true, match:class viewnior
windowrule = float true, match:class yad
windowrule = float true, match:class zenity
windowrule = float true, match:class wev
windowrule = float true, match:class pavucontrol-qt
windowrule = float true, match:class org\.quickshell     # quickshell floating popups
windowrule = float true, match:class cliphist             # clipboard picker (kitty --class cliphist)

# ── Float + size + center ─────────────────────────────────────────────────────
windowrule = float  true,   match:class org\.gnome\.Nautilus, match:title (Properties|New Folder|Rename)
windowrule = float  true,   match:class org\.gnome\.Settings
windowrule = size   70% 80%, match:class org\.gnome\.Settings
windowrule = center 1,      match:class org\.gnome\.Settings
windowrule = float  true,   match:class pavucontrol-qt
windowrule = size   60% 70%, match:class pavucontrol-qt
windowrule = center 1,      match:class pavucontrol-qt
windowrule = float  true,   match:class cliphist
windowrule = size   40% 60%, match:class cliphist
windowrule = center 1,      match:class cliphist

# ── Dialog floating rules ─────────────────────────────────────────────────────
windowrule = float true, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float true, match:title File (Operation|Upload)( Progress)?
windowrule = float true, match:title .* Properties
windowrule = float true, match:title Save As
windowrule = float true, match:title Export.*

# ── Picture-in-Picture ────────────────────────────────────────────────────────
windowrule = float            true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin              true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = keep_aspect_ratio true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = move 100%-w-12 100%-w-12, match:title Picture(-| )in(-| )[Pp]icture

# ── Games ─────────────────────────────────────────────────────────────────────
windowrule = opaque       true,   match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = immediate    true,   match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = idle_inhibit always, match:class (steam_app_(default|[0-9]+))|gamescope
windowrule = float        true,   match:title Friends List, match:class steam
windowrule = rounding     8,      match:class steam

# ── XWayland fix: skip dim/shadow on bare popup windows ──────────────────────
windowrule = no_dim    true, match:xwayland 1, match:title win[0-9]+
windowrule = no_shadow true, match:xwayland 1, match:title win[0-9]+

# ── Creative apps (opaque for color accuracy) ─────────────────────────────────
windowrule = opaque true, match:class krita|gimp|inkscape|darktable|blender

# ── Workspace rules ───────────────────────────────────────────────────────────
# Single-window workspaces get extra outer gap
workspace = w[tv1]s[false], gapsout:20
workspace = f[1]s[false],   gapsout:20

# ── Layer rules ───────────────────────────────────────────────────────────────
# Our Quickshell layer namespaces
layerrule = animation slide,         match:namespace qs-settings
layerrule = animation slide bottom,  match:namespace qs-osd
layerrule = animation popin 90%,     match:namespace qs-launcher
layerrule = blur true,               match:namespace qs-launcher
layerrule = blur true,               match:namespace qs-settings
layerrule = animation fade,          match:namespace qs-bar
layerrule = no_anim true,            match:namespace qs-bar

# System utilities
layerrule = animation fade, match:namespace selection         # slurp region selector
layerrule = animation fade, match:namespace hyprpicker
