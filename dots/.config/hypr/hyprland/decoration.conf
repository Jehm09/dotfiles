# Window decoration: rounded corners, blur, shadows, opacity

decoration {
    rounding            = 12

    active_opacity      = 1.0
    inactive_opacity    = 0.92
    fullscreen_opacity  = 1.0

    dim_inactive        = false
    dim_strength        = 0.08

    drop_shadow         = true
    shadow_range        = 16
    shadow_render_power = 3
    shadow_color        = rgba(1a1a2ecc)
    shadow_offset       = 0 4

    blur {
        enabled             = true
        size                = 8
        passes              = 2
        new_optimizations   = true
        xray                = false
        ignore_opacity      = false
    }
}
