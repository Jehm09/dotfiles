# Animation configuration
# Uses smooth easing curves for a polished feel without being sluggish.

animations {
    enabled = true

    # Custom bezier curves
    bezier = easeOutQuint,  0.23, 1,    0.32, 1
    bezier = easeInOutCubic,0.65, 0.05, 0.35, 1
    bezier = linear,        0,    0,    1,    1
    bezier = easeOutBack,   0.34, 1.56, 0.64, 1

    # Windows: slide in/out with slight bounce
    animation = windows,     1, 5,  easeOutBack,   slide
    animation = windowsOut,  1, 4,  easeOutQuint,  slide
    animation = windowsMove, 1, 4,  easeInOutCubic

    # Fade for dialogs and floating windows
    animation = fade,        1, 3,  easeOutQuint
    animation = fadeIn,      1, 3,  easeOutQuint
    animation = fadeOut,     1, 2,  easeOutQuint

    # Workspace switching
    animation = workspaces,  1, 4,  easeOutQuint,  slide

    # Layer surfaces (bar, launcher, etc.)
    animation = layers,      1, 3,  easeOutQuint,  fade
    animation = layersIn,    1, 4,  easeOutBack,   fade
}
