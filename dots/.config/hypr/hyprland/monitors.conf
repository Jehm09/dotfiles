# Monitor configuration
# Default: use preferred resolution/refresh on all connected monitors.
# Override in monitors.local.conf for machine-specific layouts.
#
# Format: monitor = NAME, RESOLUTION@REFRESHRATE, POSITION, SCALE
# Examples:
#   monitor = DP-1, 2560x1440@144, 0x0, 1
#   monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
#   monitor = eDP-1, 1920x1080@60, 0x0, 1   # laptop internal display

monitor = , preferred, auto, 1

# Load machine-specific overrides (not tracked by git - create locally if needed)
source = ~/.config/hypr/hyprland/monitors.local.conf
