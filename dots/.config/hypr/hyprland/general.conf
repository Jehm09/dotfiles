# ── Layout, gaps, borders ────────────────────────────────────────────────────

general {
    layout      = dwindle
    allow_tearing = false

    gaps_in  = 5
    gaps_out = 10
    border_size = 1

    col.active_border   = rgba(cba6f7e6)   # Catppuccin Mauve (replaced by matugen at runtime)
    col.inactive_border = rgba(45475a33)

    resize_on_border = true
    snap {
        enabled    = true
        window_gap = 4
        monitor_gap = 6
    }
}

dwindle {
    preserve_split  = true
    smart_split     = false
    smart_resizing  = true
}

# ── Decoration (rounding, blur, shadow, dim) ─────────────────────────────────

decoration {
    rounding = 12

    blur {
        enabled           = true
        size              = 8
        passes            = 2
        xray              = false
        special           = false
        popups            = true
        new_optimizations = true
        noise             = 0.02
        contrast          = 0.9
        brightness        = 1.0
        vibrancy          = 0.2
    }

    shadow {
        enabled      = true
        range        = 30
        render_power = 4
        offset       = 0 4
        color        = rgba(00000033)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special  = 0.15
}

# ── Animations ────────────────────────────────────────────────────────────────

animations {
    enabled = true

    # M3 Expressive motion curves
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1.0
    bezier = emphasizedAccel, 0.30, 0.0, 0.8, 0.15
    bezier = standard,        0.20, 0.0, 0.0, 1.0
    bezier = menuDecel,       0.10, 1.0, 0.0, 1.0
    bezier = menuAccel,       0.52, 0.03, 0.72, 0.08

    # Windows
    animation = windowsIn,  1, 4, emphasizedDecel, popin 80%
    animation = windowsOut, 1, 3, emphasizedAccel, popin 90%
    animation = windowsMove,1, 4, emphasizedDecel

    # Layers (shell surfaces)
    animation = layersIn,       1, 3, emphasizedDecel, slide
    animation = layersOut,      1, 2, emphasizedAccel, slide
    animation = fadeLayersIn,   1, 3, menuDecel
    animation = fadeLayersOut,  1, 2, menuAccel

    # Fade
    animation = fadeIn,  1, 3, emphasizedDecel
    animation = fadeOut, 1, 2, emphasizedAccel

    # Borders
    animation = border, 1, 8, standard

    # Workspaces
    animation = workspaces,           1, 5, emphasizedDecel, slide
    animation = specialWorkspaceIn,   1, 4, emphasizedDecel, slidefadevert 15%
    animation = specialWorkspaceOut,  1, 3, emphasizedAccel, slidefadevert 15%
}

# ── Misc ──────────────────────────────────────────────────────────────────────

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true

    vfr = true
    vrr = 1

    animate_manual_resizes       = false
    animate_mouse_windowdragging = false

    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    on_focus_under_fullscreen    = 2
    allow_session_lock_restore   = true
    middle_click_paste           = false
    focus_on_activate            = true
    session_lock_xray            = true
    initial_workspace_tracking   = false
}

binds {
    scroll_event_delay          = 0
    hide_special_on_workspace_change = true
}

cursor {
    hotspot_padding = 1
}

xwayland {
    force_zero_scaling = true
}
