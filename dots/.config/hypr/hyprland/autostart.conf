# Autostart - programs launched once when Hyprland starts

# Unlock gnome-keyring secrets daemon (passwords, SSH keys, etc.)
exec-once = gnome-keyring-daemon --start --components=secrets

# Polkit agent - handles privilege escalation dialogs (sudo GUI prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Propagate Wayland display env to systemd user session and dbus
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# PipeWire audio stack (usually started by systemd, but ensure it's up)
exec-once = systemctl --user start pipewire pipewire-pulse wireplumber

# Set cursor theme
exec-once = hyprctl setcursor Adwaita 24

# Clipboard history daemon - must run before cliphist can capture anything
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle daemon - locks screen after inactivity
exec-once = hypridle

# Quickshell shell (bar, notifications, launcher, OSD, etc.)
exec-once = quickshell
